*{box-sizing:border-box}
body{

padding:120px 20px 200px;

}

width:100%;

  padding: 20px;

.widget-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  color: #e5e7eb;
  margin: 0 0 15px 0;
  text-align: center;

.channel-widget {

.btn{
  position: relative;
  overflow: hidden;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 18px;
  background:rgba(99,102,241,.4);

.btn:hover{background:rgba(99,102,241,.7);box-shadow:0 0 20px #6366f1;}

.cursor-dot{
  position:fixed;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  z-index:10000;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, background 0.2s, box-shadow 0.2s;
}

.cursor-glow{
position:fixed;
width:60px;
height:60px;
background:radial-gradient(circle, white, transparent 60%);
border-radius:50%;
filter:blur(6px);
pointer-events:none;
z-index:9998;
transform: translate(-50%, -50%);
}

.cursor-particle {
  position: fixed;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
}

body.hovering .cursor-dot {
    width: 20px;
    height: 20px;
    background: #00ff99;
    box-shadow: 0 0 20px #00ff99, 0 0 40px rgba(0, 255, 153, 0.5);
}

.bottom-content{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
opacity:0;
pointer-events:none;
transition:.5s;
}

.bottom-content.visible{
opacity:1;
pointer-events:auto;
}

.dev-link {
  color: #ffffff !important;
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.dev-link:hover {

}

.bottom-sections{
display:flex;
gap:30px;
font-size:13px;
color:#9ca3af;
margin-bottom:10px;
}

.bottom-gif{
width:100%;
max-height:90px;
object-fit:contain;
}

.topbar{
  position:fixed;
  top:18px;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  z-index:3000;
  transition:.35s ease;
}
.topbar-pill{
  width:92%;
  max-width:1200px;
  padding:10px 22px;
  border-radius:999px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 0 30px rgba(99,102,241,.25);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  font-family:Orbitron,sans-serif;
  font-weight:700;
  font-size:20px;
}
.topbar-left{

.topbar-left nav a{

  margin-right:15px;

<script>
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class ParticleBg {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.alpha = Math.random() * 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.fillStyle = `rgba(99, 102, 241, ${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) {
  particlesArray.push(new ParticleBg());
}

function animateBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateBg);
}
animateBg();

const dot = document.querySelector(".cursor-dot");
const glow = document.querySelector(".cursor-glow");
let mx = 0, my = 0, gx = 0, gy = 0;

addEventListener("mousemove", e => {
    mx = e.clientX;
    my = e.clientY;
    dot.style.left = mx + "px";
    dot.style.top = my + "px";

    createParticle(mx, my);

    const isClickable = e.target.closest('a, button, .btn, textarea, img, nav a');
    if(isClickable) {
        document.body.classList.add('hovering');
    } else {
        document.body.classList.remove('hovering');
    }
});

function createParticle(x, y) {
    const p = document.createElement("div");
    p.className = "cursor-particle";
    const size = Math.random() * 3 + 1;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = x + "px";
    p.style.top = y + "px";
    document.body.appendChild(p);

    const anim = p.animate([
        { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 },
        { transform: `translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px) scale(0)`, opacity: 0 }
    ], { duration: 800, easing: 'ease-out' });

    anim.onfinish = () => p.remove();
}

(function loop(){
  gx += (mx - gx) * 0.08;
  gy += (my - gy) * 0.08;
  glow.style.left = gx + "px";
  glow.style.top = gy + "px";
  requestAnimationFrame(loop);
})();

const bottom = document.getElementById("bottom-content");
addEventListener("scroll",()=>{
    const s = document.documentElement.scrollHeight - innerHeight;
    if (s > 0) {
        scrollY >= s - 10 ? bottom.classList.add("visible") : bottom.classList.remove("visible");
    }
});

const widget = SC.Widget(document.getElementById("sc-player"));
document.addEventListener("click", () => widget.play(), {once: true});
</script>
