.cursor-dot{position:fixed;width:10px;height:10px;background:white;border-radius:50%;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s,box-shadow .2s}

body.hovering .cursor-dot{width:20px;height:20px;background:#00ff99;box-shadow:0 0 20px #00ff99,0 0 40px rgba(0,255,153,.5)}

<script>
const PER_PAGE = 20;
let currentPage = 1;
let totalResults = 0;
let lastTerm = '';

async function doSearch(page = 1) {
  const term = page === 1 ? document.getElementById('search-input').value.trim() : lastTerm;
  const btn = document.getElementById('search-btn');
  const box = document.getElementById('results-box');
  const list = document.getElementById('results-list');
  const count = document.getElementById('result-count');
  const pagination = document.getElementById('pagination');

  if (!term) return;
  lastTerm = term;
  currentPage = page;

  btn.disabled = true;
  btn.textContent = '...';
  box.style.display = 'block';
  list.innerHTML = '<div class="no-results">Searching...</div>';
  pagination.innerHTML = '';
  count.textContent = '?';

  try {
    const start = (page - 1) * PER_PAGE;
    const res = await fetch(`https://api.proxynova.com/comb?query=${encodeURIComponent(term)}&start=${start}&limit=${PER_PAGE}`);

    if (res.status === 429) {
      list.innerHTML = '<div class="error-msg">⏳ Rate limited. Wait a moment and try again.</div>';
      count.textContent = '0';
      btn.disabled = false; btn.textContent = 'SEARCH';
      return;
    }
    if (!res.ok) {
      list.innerHTML = `<div class="error-msg">⚠️ API error ${res.status}.</div>`;
      count.textContent = '0';
      btn.disabled = false; btn.textContent = 'SEARCH';
      return;
    }

    const data = await res.json();
    const lines = data.lines || [];
    totalResults = data.count ?? lines.length;
    const totalPages = Math.ceil(totalResults / PER_PAGE);

    count.textContent = totalResults;
    list.innerHTML = '';

    if (!lines.length) {
      list.innerHTML = '<div class="no-results">✅ No results found.</div>';
    } else {
      lines.forEach(line => {
        const [emailUser, ...passParts] = line.split(':');
        const password = passParts.join(':');
        const domain = emailUser.includes('@') ? emailUser.split('@')[1] : null;
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
          <div class="result-source">🔴 COMB${domain ? ` — ${escHtml(domain)}` : ''}</div>
          <div class="result-fields">
            <div class="result-field"><span>login:</span>${escHtml(emailUser)}</div>
            ${password ? `<div class="result-field"><span>password:</span>${escHtml(password)}</div>` : ''}
          </div>`;
        list.appendChild(div);
      });
    }

    // Pagination
    if (totalPages > 1) {
      const prev = document.createElement('button');
      prev.className = 'search-btn';
      prev.textContent = '← Prev';
      prev.disabled = page <= 1;
      prev.style.padding = '8px 16px';
      prev.onclick = () => doSearch(page - 1);

      const info = document.createElement('span');
      info.style.cssText = 'color:#9ca3af;font-size:13px';
      info.textContent = `Page ${page} / ${totalPages}`;

      const next = document.createElement('button');
      next.className = 'search-btn';
      next.textContent = 'Next →';
      next.disabled = page >= totalPages;
      next.style.padding = '8px 16px';
      next.onclick = () => doSearch(page + 1);

      pagination.appendChild(prev);
      pagination.appendChild(info);
      pagination.appendChild(next);
    }

  } catch(e) {
    list.innerHTML = '<div class="error-msg">⚠️ Request failed. Try again.</div>';
    count.textContent = '0';
  }

  btn.disabled = false;
  btn.textContent = 'SEARCH';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

/* Particles */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particlesArray = [];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);resizeCanvas();
class ParticleBg{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+.5;this.speedX=(Math.random()-.5)*.4;this.speedY=(Math.random()-.5)*.4;this.alpha=Math.random()*.5}
  update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset()}
  draw(){ctx.fillStyle=`rgba(99,102,241,${this.alpha})`;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}
}
for(let i=0;i<80;i++)particlesArray.push(new ParticleBg());
function animateBg(){ctx.clearRect(0,0,canvas.width,canvas.height);particlesArray.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animateBg)}
animateBg();

/* Cursor */
const dot=document.querySelector(".cursor-dot");
const glow=document.querySelector(".cursor-glow");
let mx=0,my=0,gx=0,gy=0;
addEventListener("mousemove",e=>{
  mx=e.clientX;my=e.clientY;
  dot.style.left=mx+"px";dot.style.top=my+"px";
  createParticle(mx,my);
  document.body.classList.toggle('hovering',!!e.target.closest('a,button,.btn,input,select'));
});
function createParticle(x,y){
  const p=document.createElement("div");p.className="cursor-particle";
  const size=Math.random()*3+1;p.style.width=size+"px";p.style.height=size+"px";
  p.style.left=x+"px";p.style.top=y+"px";document.body.appendChild(p);
  const anim=p.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:.8},{transform:`translate(${(Math.random()-.5)*30}px,${(Math.random()-.5)*30}px) scale(0)`,opacity:0}],{duration:800,easing:'ease-out'});
  anim.onfinish=()=>p.remove();
}
(function loop(){gx+=(mx-gx)*.08;gy+=(my-gy)*.08;glow.style.left=gx+"px";glow.style.top=gy+"px";requestAnimationFrame(loop)})();

/* Bottom */
const bottom=document.getElementById("bottom-content");
addEventListener("scroll",()=>{
  const s=document.documentElement.scrollHeight-innerHeight;
  if(s>0){scrollY>=s-10?bottom.classList.add("visible"):bottom.classList.remove("visible")}
  else bottom.classList.add("visible");
});
window.addEventListener('load',()=>{
  if(document.documentElement.scrollHeight-innerHeight<=0)bottom.classList.add("visible");
});

/* Music controls */
HCMusicControls.init({ promptOnEntry: false });
</script>
