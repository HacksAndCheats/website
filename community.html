.stat-card {

.stat-card:nth-child(1) { animation-delay: 0.1s; }

@keyframes fadeInUp {

  }
  to {

  }
}

.stat-card::before {

  left: -50%;

  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(99,102,241,.1), transparent);

}

.stat-card:hover::before {

}

.stat-card:hover {

  box-shadow: 0 10px 50px rgba(99,102,241,.6);

.stat-card-title {

<script>
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class ParticleBg {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.alpha = Math.random() * 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.fillStyle = `rgba(99, 102, 241, ${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) {
  particlesArray.push(new ParticleBg());
}

function animateBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateBg);
}
animateBg();

/* Discord Stats */
async function updateCommunityStats() {
  try {
    const inviteResponse = await fetch('https://discord.com/api/v9/invites/hacksandcheats?with_counts=true');
    if (inviteResponse.ok) {
      const inviteData = await inviteResponse.json();
      
      if (inviteData.approximate_member_count) {
        document.getElementById('total-members').textContent = inviteData.approximate_member_count.toLocaleString();
      }
      if (inviteData.approximate_presence_count) {
        document.getElementById('online-members').textContent = inviteData.approximate_presence_count.toLocaleString();
      }
      
      // Info sur le serveur (guild)
      if (inviteData.guild) {
        const boostCount = inviteData.guild.premium_subscription_count || 0;
        document.getElementById('boost-count').textContent = boostCount;
        document.getElementById('boost-total').textContent = boostCount;
        
        // Calcul du niveau basé sur les boosts
        let level = 0;
        if (boostCount >= 14) level = 3;
        else if (boostCount >= 7) level = 2;
        else if (boostCount >= 2) level = 1;
        
        document.getElementById('boost-level').textContent = level;
      }
    }
    
    const widgetResponse = await fetch('https://discord.com/api/guilds/1445500722828279918/widget.json');
    
    if (widgetResponse.ok) {
      const widgetData = await widgetResponse.json();
      
      if (widgetData.presence_count !== undefined) {
        document.getElementById('online-members').textContent = widgetData.presence_count.toLocaleString();
      }
      
      const membersList = document.getElementById('members-list');
      membersList.innerHTML = '';
      
      if (widgetData.members && widgetData.members.length > 0) {
        widgetData.members.forEach(member => {
          const memberCard = document.createElement('div');
          memberCard.className = 'member-card';
          
          const statusClass = member.status === 'online' ? 'status-online' : 
                             member.status === 'idle' ? 'status-idle' : 
                             member.status === 'dnd' ? 'status-dnd' : '';
          
          const statusEmoji = member.status === 'online' ? '🟢' : 
                             member.status === 'idle' ? '🟡' : 
                             member.status === 'dnd' ? '🔴' : '⚫';
          
          memberCard.innerHTML = `
            <img src="${member.avatar_url}" alt="${member.username}" class="member-avatar">
            <div class="member-info">
              <div class="member-name">${member.username}</div>
              <div class="member-status ${statusClass}">${statusEmoji} ${member.status || 'online'}</div>
            </div>
          `;
          
          membersList.appendChild(memberCard);
        });
      } else {
        membersList.innerHTML = '<div style="color: #9ca3af; font-size: 12px; text-align: center; padding: 10px;">Enable Discord widget in server settings to see online members</div>';
      }
    } else {
      const membersList = document.getElementById('members-list');
      membersList.innerHTML = '<div style="color: #9ca3af; font-size: 12px; text-align: center; padding: 10px;">⚠️ Discord widget not enabled</div>';
    }
  } catch (error) {
    console.error('Erreur:', error);
  }
}

updateCommunityStats();
setInterval(updateCommunityStats, 30000);

const dot = document.querySelector(".cursor-dot");
const glow = document.querySelector(".cursor-glow");
let mx = 0, my = 0, gx = 0, gy = 0;

addEventListener("mousemove", e => {
    mx = e.clientX;
    my = e.clientY;
    dot.style.left = mx + "px";
    dot.style.top = my + "px";

    createParticle(mx, my);

    const isClickable = e.target.closest('a, button, .btn, textarea, img, nav a');
    if(isClickable) {
        document.body.classList.add('hovering');
    } else {
        document.body.classList.remove('hovering');
    }
});

function createParticle(x, y) {
    const p = document.createElement("div");
    p.className = "cursor-particle";
    const size = Math.random() * 3 + 1;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = x + "px";
    p.style.top = y + "px";
    document.body.appendChild(p);

    const anim = p.animate([
        { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 },
        { transform: `translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px) scale(0)`, opacity: 0 }
    ], { duration: 800, easing: 'ease-out' });

    anim.onfinish = () => p.remove();
}

(function loop(){
  gx += (mx - gx) * 0.08;
  gy += (my - gy) * 0.08;
  glow.style.left = gx + "px";
  glow.style.top = gy + "px";
  requestAnimationFrame(loop);
})();

const bottom = document.getElementById("bottom-content");
addEventListener("scroll",()=>{
    const s = document.documentElement.scrollHeight - innerHeight;
    if (s > 0) {
        scrollY >= s - 10 ? bottom.classList.add("visible") : bottom.classList.remove("visible");
    }
});

const widget = SC.Widget(document.getElementById("sc-player"));

// Système de synchronisation de la musique entre les pages
let musicState = {
  isPlaying: false,
  position: 0,
  lastUpdate: Date.now()
};

// Charger l'état de la musique depuis localStorage
function loadMusicState() {
  const saved = localStorage.getItem('musicState');
  if (saved) {
    musicState = JSON.parse(saved);
    // Si la musique était en lecture, calculer la nouvelle position
    if (musicState.isPlaying) {
      const elapsed = (Date.now() - musicState.lastUpdate) / 1000;
      musicState.position += elapsed;
    }
  }
}

// Sauvegarder l'état de la musique
function saveMusicState() {
  musicState.lastUpdate = Date.now();
  localStorage.setItem('musicState', JSON.stringify(musicState));
}

// Initialiser la musique
loadMusicState();

widget.bind(SC.Widget.Events.READY, function() {
  if (musicState.isPlaying) {
    widget.seekTo(musicState.position * 1000);
    widget.play();
  }
  
  // Sauvegarder la position toutes les secondes
  setInterval(() => {
    widget.getPosition(function(pos) {
      musicState.position = pos / 1000;
      widget.isPaused(function(paused) {
        musicState.isPlaying = !paused;
        saveMusicState();
      });
    });
  }, 1000);
});

// Démarrer la musique au premier clic
document.addEventListener("click", () => {
  widget.isPaused(function(paused) {
    if (paused) {
      widget.play();
      musicState.isPlaying = true;
      saveMusicState();
    }
  });
}, {once: true});

// Sauvegarder avant de quitter la page
window.addEventListener('beforeunload', () => {
  widget.getPosition(function(pos) {
    musicState.position = pos / 1000;
    widget.isPaused(function(paused) {
      musicState.isPlaying = !paused;
      saveMusicState();
    });
  });
});
</script>

</body>
</html>
